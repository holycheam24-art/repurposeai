<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RepurposeAI</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;color:#ede9ff;font-family:sans-serif;min-height:100vh}
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}
h1{font-size:3rem;font-weight:900;margin-bottom:16px;background:linear-gradient(135deg,#fff,#9d7cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:rgba(237,233,255,0.6);font-size:1.1rem;margin-bottom:32px;max-width:500px}
.btn{padding:16px 36px;background:linear-gradient(135deg,#7455ff,#e040fb);border:none;color:#fff;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
function App() {
  return (
    <div className="hero">
      <h1>RepurposeAI</h1>
      <p>Turn one piece of content into platform-ready posts for Twitter, LinkedIn, Instagram, email and TikTok — instantly.</p>
      <button className="btn">Start Repurposing Free →</button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
